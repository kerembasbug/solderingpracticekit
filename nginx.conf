server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml
        application/javascript application/json application/xml
        application/rss+xml image/svg+xml;

    # ---- Security headers ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ---- Long-cache hashed Astro assets ----
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---- Cache other static assets ----
    location ~* \.(?:css|js|png|jpe?g|gif|webp|avif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # robots.txt & sitemap should not be cached aggressively
    location = /robots.txt { add_header Cache-Control "public, max-age=3600"; }
    location = /sitemap-index.xml { add_header Cache-Control "public, max-age=3600"; }

    # ---- Clean URLs: serve directory index internally, NO trailing-slash redirect ----
    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    # ---- Custom 404 ----
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
